baseURL: "https://missquibble.com/"
title: Home
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# googleAnalytics: ""  # Add your GA4 tracking ID (e.g. G-XXXXXXXXXX)

minify:
  disableXML: true
  minifyOutput: true

outputs:
    home:
        - HTML
        - RSS
        - JSON # is necessary

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: MissQuibble
  description: "MissQuibbles Website & Blog"
  keywords: [Blog, Portfolio, PaperMod]
  author: MissQuibble
  # author: ["Me", "You"] # multiple authors
  # images: ["https://missquibble.com/Images/dezzis.png"]  # OG image URL
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true

  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title:  MissQuibble
    subtitle: "Full stack developer · Cybersecurity specialist · Blockchain enthusiast · Content creator"
    imageUrl: "dezzis.png" 
    imageWidth: 240
    imageHeight: 240
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags    
   # home-info mode
   # profileInfoParams:
    #Title: "Hi there \U0001F44B"
    #Content: Welcome to my website, you can find my blog, social platforms and more here!
  

  socialIcons:
    - name: github
      url: "https://github.com/DomainWarrior"
    - name: peakd
      url: "https://ecency.com/@missquibble"

  # analytics:
  #   google:
  #     SiteVerificationTag: ""  # Add your Google Search Console tag
  #   bing:
  #     SiteVerificationTag: ""
  #   yandex:
  #     SiteVerificationTag: ""

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # editPost:
  #   URL: "https://github.com/DomainWarrior/missquibble/content"
  #   Text: "Suggest Changes"
  #   appendFilePath: true

  # for search
  # https://fusejs.io/api/options.html
#  fuseOpts:
 #   isCaseSensitive: false
  #  shouldSort: true
   # location: 0
   # distance: 1000
  #  threshold: 0.4
  #  minMatchCharLength: 0
 #   limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
 #   keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: portfolio
      name: portfolio
      url: /portfolio/
      weight: 10
    - identifier: categories
      name: categories
      url: /categories/
      weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      weight: 20
    - identifier: twitch
      name: Twitch
      url: https://www.twitch.tv/yourdestinyis
      weight: 30
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: false

privacy:
  googleAnalytics:
    disable: true
    respectDoNotTrack: true
  twitter:
    enableDNT: true
  youtube:
    privacyEnhanced: true
  vimeo:
    enableDNT: true

security:
  enableInlineShortcodes: false
  funcs:
    getenv:
      - ^HUGO_
