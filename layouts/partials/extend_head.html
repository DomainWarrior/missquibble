{{- $url := getenv "HUGO_SUPABASE_URL" -}}
{{- $key := getenv "HUGO_SUPABASE_ANON_KEY" -}}
{{- if and $url $key -}}
<meta name="mq-supabase-url" content="{{ $url }}">
<meta name="mq-supabase-key" content="{{ $key }}">
{{- end }}
<meta name="mq-slug"  content="{{ .RelPermalink }}">
<meta name="mq-title" content="{{ .Title }}">
<meta name="mq-desc"  content="{{ .Description }}">
<link rel="stylesheet" href="/css/mq-actions.css">

{{/* JSON-LD structured data */}}
{{- if and .IsPage (eq .Section "posts") -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "url": {{ .Permalink | jsonify }},
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": {
    "@type": "Person",
    "name": "MissQuibble",
    "url": "https://missquibble.com"
  },
  "publisher": {
    "@type": "Organization",
    "name": "MissQuibble",
    "logo": {
      "@type": "ImageObject",
      "url": "https://missquibble.com/dezzis.png"
    }
  }{{ with .Params.tags }},
  "keywords": {{ . | jsonify }}{{ end }}
}
</script>
{{- else if .IsHome -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "MissQuibble",
  "url": "https://missquibble.com",
  "description": "Full stack developer, cybersecurity specialist, and content creator.",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://missquibble.com/search/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{{- end }}
